[build]
builder = "nixpacks"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

[env]
PYTHON_VERSION = "3.12"
PORT = "8000"

[[phases]]
name = "install"
cmd = "pip install --no-cache-dir -r requirements-deploy.txt"

[[phases]]
name = "build"
cmd = "echo 'Build complete'"
